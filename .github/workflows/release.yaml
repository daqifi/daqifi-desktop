name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Publish Application
      run: dotnet publish Daqifi.Desktop/Daqifi.Desktop.csproj --configuration Release --output Daqifi.Desktop/bin/Release/net10.0-windows/publish --no-build

    - name: Build MSI Installer
      run: |
        cd Daqifi.Desktop.Setup
        dotnet build -c Release

    - name: Verify MSI
      shell: pwsh
      run: |
        $msiPath = "Daqifi.Desktop.Setup/DAQifiDesktopSetup/bin/x86/Release/DAQifiDesktop_Setup.msi"
        if (-not (Test-Path $msiPath)) {
          Write-Error "MSI not found: $msiPath"
          exit 1
        }
        $size = (Get-Item $msiPath).Length
        if ($size -eq 0) {
          Write-Error "MSI is zero bytes: $msiPath"
          exit 1
        }
        Write-Host "MSI OK: $msiPath ($([math]::Round($size / 1MB, 2)) MB)"

    - name: Create Draft Release
      uses: softprops/action-gh-release@v3
      with:
        draft: true
        generate_release_notes: true
        files: Daqifi.Desktop.Setup/DAQifiDesktopSetup/bin/x86/Release/DAQifiDesktop_Setup.msi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
